services:
  banchonet:
    image: banchonet
    hostname: banchonet
    container_name: banchonet
    build:
      context: .
      dockerfile: BanchoNET/Dockerfile
    ports:
      - ${SERVER_PORT}:5000
    env_file:
      - .env
    volumes:
      - banchonet-lazer-data:/data/lazer
      - ${DATA_PATH:-./data}:/app/files
    restart: unless-stopped
    networks:
      - banchonet
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      MongoDB:
        condition: service_started

  postgres:
    image: postgres:latest
    hostname: banchonet-db
    container_name: banchonet-db
    environment:
      POSTGRES_DB: ${MYSQL_DB}
      POSTGRES_USER: ${MYSQL_USER}
      POSTGRES_PASSWORD: ${MYSQL_PASS}
    configs:
      - source: init_db
        target: /docker-entrypoint-initdb.d/second.sh
        mode: 0755
    volumes:
      - banchonet-db-data:/var/lib/postgresql/data
    ports:
      - ${MYSQL_PORT}:5432
    restart: unless-stopped
    networks:
      - banchonet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$MYSQL_USER\" -d \"$MYSQL_DB\" -h localhost || exit 1"]
      interval: 2s
      timeout: 20s
      retries: 10

  redis:
    image: redis
    hostname: banchonet-redis
    container_name: banchonet-redis
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASS}
    restart: unless-stopped
    networks:
      - banchonet

  MongoDB:
    image: mongo
    hostname: banchonet-mongo
    container_name: banchonet-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - ${MONGO_PORT}:27017
    volumes:
      - banchonet-mongo-data:/data/db
    restart: unless-stopped
    networks:
      - banchonet

networks:
  banchonet:
    name: banchonet

volumes:
  banchonet-lazer-data:
    driver: local
  banchonet-db-data:
    driver: local
  banchonet-mongo-data:
    driver: local

configs:
  init_db:
    content: |
      #!/bin/bash
      set -e
      echo "Creating hangfire database and user (if not present)..."
      psql -v ON_ERROR_STOP=1 --username "$MYSQL_USER" <<-EOSQL
        CREATE DATABASE hangfire;
        CREATE USER "${MYSQL_USER}" WITH PASSWORD '${MYSQL_PASS}';
        GRANT ALL PRIVILEGES ON DATABASE hangfire TO "${MYSQL_USER}";
      EOSQL